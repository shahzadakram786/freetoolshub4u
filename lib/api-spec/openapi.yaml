openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ToolsHub API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: weather
    description: Weather operations
  - name: currency
    description: Currency operations
  - name: tools
    description: Tool operations
  - name: image
    description: Image AI operations
  - name: blog
    description: Blog operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /weather:
    get:
      operationId: getWeather
      tags: [weather]
      summary: Get weather for a city
      parameters:
        - name: city
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Weather data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherData"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /weather/by-coords:
    get:
      operationId: getWeatherByCoords
      tags: [weather]
      summary: Get weather by GPS coordinates
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lon
          in: query
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Weather data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherData"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /currency/rates:
    get:
      operationId: getCurrencyRates
      tags: [currency]
      summary: Get currency exchange rates
      parameters:
        - name: base
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Currency rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrencyRates"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/shorten-url:
    post:
      operationId: shortenUrl
      tags: [tools]
      summary: Shorten a URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShortenUrlRequest"
      responses:
        "200":
          description: Shortened URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortenUrlResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/paraphrase:
    post:
      operationId: paraphraseText
      tags: [tools]
      summary: Paraphrase text to remove plagiarism
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TextRequest"
      responses:
        "200":
          description: Paraphrased text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/check-ai:
    post:
      operationId: checkAiContent
      tags: [tools]
      summary: Check if content is AI-generated
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TextRequest"
      responses:
        "200":
          description: AI detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiDetectionResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/check-plagiarism:
    post:
      operationId: checkPlagiarism
      tags: [tools]
      summary: Check text for plagiarism
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TextRequest"
      responses:
        "200":
          description: Plagiarism check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlagiarismResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /image/remove-bg:
    post:
      operationId: removeBg
      tags: [image]
      summary: Remove background from image using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageBase64Request"
      responses:
        "200":
          description: Image with background removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageBase64Response"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: API key not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /image/erase-object:
    post:
      operationId: eraseObject
      tags: [image]
      summary: Erase object from image using AI inpainting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EraseObjectRequest"
      responses:
        "200":
          description: Image with object erased
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageBase64Response"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: API key not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blog/posts:
    get:
      operationId: getBlogPosts
      tags: [blog]
      summary: Get all blog posts
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Blog posts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPostList"

  /blog/posts/{slug}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get a single blog post by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Single blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Post not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    WeatherData:
      type: object
      properties:
        city:
          type: string
        country:
          type: string
        temperature:
          type: number
        feelsLike:
          type: number
        humidity:
          type: number
        windSpeed:
          type: number
        description:
          type: string
        icon:
          type: string
        visibility:
          type: number
        pressure:
          type: number
      required:
        - city
        - country
        - temperature
        - feelsLike
        - humidity
        - windSpeed
        - description
        - icon
        - visibility
        - pressure

    CurrencyRates:
      type: object
      properties:
        base:
          type: string
        rates:
          type: object
          additionalProperties:
            type: number
        timestamp:
          type: integer
      required:
        - base
        - rates
        - timestamp

    ShortenUrlRequest:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    ShortenUrlResponse:
      type: object
      properties:
        originalUrl:
          type: string
        shortUrl:
          type: string
        shortCode:
          type: string
      required:
        - originalUrl
        - shortUrl
        - shortCode

    TextRequest:
      type: object
      properties:
        text:
          type: string
      required:
        - text

    TextResponse:
      type: object
      properties:
        original:
          type: string
        result:
          type: string
      required:
        - original
        - result

    AiDetectionResult:
      type: object
      properties:
        aiScore:
          type: number
        humanScore:
          type: number
        verdict:
          type: string
        sentences:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              score:
                type: number
            required:
              - text
              - score
      required:
        - aiScore
        - humanScore
        - verdict
        - sentences

    PlagiarismResult:
      type: object
      properties:
        score:
          type: number
        verdict:
          type: string
        uniqueScore:
          type: number
        matches:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              similarity:
                type: number
            required:
              - text
              - similarity
      required:
        - score
        - verdict
        - uniqueScore
        - matches

    ImageBase64Request:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64 encoded image
        mimeType:
          type: string
          description: Image MIME type (image/jpeg, image/png)
      required:
        - imageBase64
        - mimeType

    EraseObjectRequest:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64 encoded original image
        maskBase64:
          type: string
          description: Base64 encoded mask image (white = erase, black = keep)
        mimeType:
          type: string
      required:
        - imageBase64
        - maskBase64
        - mimeType

    ImageBase64Response:
      type: object
      properties:
        resultBase64:
          type: string
          description: Base64 encoded result image
        mimeType:
          type: string
      required:
        - resultBase64
        - mimeType

    BlogPostSummary:
      type: object
      properties:
        slug:
          type: string
        title:
          type: string
        excerpt:
          type: string
        category:
          type: string
        author:
          type: string
        publishedAt:
          type: string
        readTime:
          type: integer
        coverImage:
          type: string
        tags:
          type: array
          items:
            type: string
      required:
        - slug
        - title
        - excerpt
        - category
        - author
        - publishedAt
        - readTime
        - coverImage
        - tags

    BlogPost:
      type: object
      properties:
        slug:
          type: string
        title:
          type: string
        excerpt:
          type: string
        content:
          type: string
          description: HTML content of the post
        category:
          type: string
        author:
          type: string
        publishedAt:
          type: string
        readTime:
          type: integer
        coverImage:
          type: string
        tags:
          type: array
          items:
            type: string
      required:
        - slug
        - title
        - excerpt
        - content
        - category
        - author
        - publishedAt
        - readTime
        - coverImage
        - tags

    BlogPostList:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/BlogPostSummary"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - posts
        - total
        - page
        - totalPages
