packages:
  "framer-motion": "Smooth page transitions and micro-interactions"
  "qrcode.react": "Generating QR codes on the client side"
  "tesseract.js": "Client-side OCR for image-to-text conversion"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to safely merge Tailwind CSS classes"

images:
  - path: "artifacts/toolshub/public/images/hero-abstract.png"
    description: "A beautiful, subtle abstract gradient background with glowing teal and deep violet colors, geometric glassmorphism shapes floating, clean and modern"
    aspect_ratio: "16:9"

notes:
  - Expects backend API to handle weather, currency, and AI checking endpoints as defined in the OpenAPI schema.
  - Tesseract.js loads workers dynamically on first use.
