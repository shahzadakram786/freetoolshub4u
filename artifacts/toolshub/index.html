<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ToolsHub — Free Online Tools</title>
    <meta name="description" content="Free online tools for everyone. AI background remover, live currency converter, weather report, plagiarism checker, and 15+ more — no signup required." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect to Google Fonts for faster DNS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Load fonts async (non-render-blocking) -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@400;500;600;700;800&display=swap"
      onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@400;500;600;700;800&display=swap" />
    </noscript>

    <!-- Preconnect to API services used on first load -->
    <link rel="preconnect" href="https://api.frankfurter.app" />
    <link rel="preconnect" href="https://openweathermap.org" />
  </head>
  <body>
    <!-- Instant loading skeleton shown before React hydrates -->
    <div id="root">
      <div id="app-loading" style="
        position:fixed;inset:0;display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        background:hsl(210,40%,98%);z-index:9999;
        font-family:system-ui,sans-serif;
      ">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" style="margin-bottom:16px">
          <rect width="24" height="24" rx="6" fill="#5b21f0" fill-opacity="0.1"/>
          <path d="M7 10h2l2 4 2-6 2 4h2" stroke="#5b21f0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span style="font-size:20px;font-weight:700;color:#1e1b4b;letter-spacing:-0.5px">
          Tools<span style="color:#5b21f0">Hub</span>
        </span>
        <div style="
          margin-top:20px;width:36px;height:36px;
          border:3px solid hsl(210,40%,91%);
          border-top-color:#5b21f0;
          border-radius:50%;
          animation:spin 0.7s linear infinite;
        "></div>
        <style>
          @keyframes spin{to{transform:rotate(360deg)}}
          @media(prefers-color-scheme:dark){
            #app-loading{background:hsl(222,47%,11%)!important}
            #app-loading span{color:#e2e8f0!important}
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
